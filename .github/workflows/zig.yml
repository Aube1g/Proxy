name: Build mtproto.zig

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: sleep3r/mtproto.zig

      - name: Install Zig 0.16.0
        run: |
          # Правильная ссылка на Zig
          curl -L https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz -o zig.tar.xz

          # Проверяем
          ls -la zig.tar.xz
          file zig.tar.xz

          # Распаковываем
          tar -xf zig.tar.xz

          # Находим zig и добавляем в PATH
          ZIG_BIN=$(find . -name "zig" -type f | head -1)
          ZIG_DIR=$(dirname "$ZIG_BIN")
          echo "$ZIG_DIR" >> $GITHUB_PATH
          export PATH="$ZIG_DIR:$PATH"

          # Проверяем версию
          zig version

      - name: Build static binary
        run: |
          export PATH="$(find . -name 'zig' -type f | head -1 | xargs dirname):$PATH"
          zig version

          # Собираем только основной бинарник (без mtbuddy, bench и т.д.)
          zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSmall install 2>&1

          # Проверяем что собралось
          ls -la zig-out/bin/ || true
          find . -name "mtproto-proxy" -type f || true

      - name: Check binary
        run: |
          # Ищем бинарник
          BINARY=$(find . -name "mtproto-proxy" -type f | head -1)
          if [ -n "$BINARY" ]; then
            echo "Found: $BINARY"
            file "$BINARY"
            ls -la "$BINARY"
            # Проверяем что статический
            ldd "$BINARY" || true
          else
            echo "Binary not found, checking zig-out/"
            ls -la zig-out/ || true
            find . -type f -executable | head -20
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-build
          path: |
            zig-out/bin/*
            **/mtproto-proxy
