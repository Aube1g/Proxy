name: Build mtproto.zig

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: sleep3r/mtproto.zig

      - name: Check Zig versions available
        run: |
          curl -s https://ziglang.org/download/index.json | head -100

      - name: Install Zig
        run: |
          # Пробуем скачать 0.16.0
          curl -L https://ziglang.org/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz -o zig.tar.xz ||           curl -L https://ziglang.org/builds/zig-linux-x86_64-0.16.0.tar.xz -o zig.tar.xz ||           curl -L https://ziglang.org/download/0.15.0/zig-linux-x86_64-0.15.0.tar.xz -o zig.tar.xz

          ls -la zig.tar.xz
          file zig.tar.xz

          # Распаковываем
          tar -xf zig.tar.xz
          ls -la

          # Находим zig
          find . -name "zig" -type f

          # Устанавливаем
          ZIG_DIR=$(find . -name "zig" -type f | head -1 | xargs dirname)
          echo "$ZIG_DIR" >> $GITHUB_PATH
          export PATH="$ZIG_DIR:$PATH"

          # Проверяем
          zig version

      - name: Build static binary
        run: |
          export PATH="$(find . -name 'zig' -type f | head -1 | xargs dirname):$PATH"
          zig version

          # Пробуем собрать
          zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSmall 2>&1 ||           zig build -Doptimize=ReleaseSmall 2>&1 ||           zig build 2>&1

          ls -la zig-out/bin/ || ls -la

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-build
          path: |
            zig-out/bin/*
            *.log
